<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Muhang 写作器</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header id="topbar">
      <span id="brand">Muhang 写作器</span>
      <select id="project-select"></select>
      <button id="new-project" title="新建文章">＋ 新建</button>
      <span id="save-status"></span>
      <button id="theme-toggle" title="切换深浅主题">
        <svg class="icon-sun" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="3.2"/><path d="M8 1v1.8M8 13.2V15M1 8h1.8M13.2 8H15M3.05 3.05l1.27 1.27M11.68 11.68l1.27 1.27M12.95 3.05l-1.27 1.27M4.32 11.68l-1.27 1.27"/></svg>
        <svg class="icon-moon" viewBox="0 0 16 16" aria-hidden="true"><path d="M13.5 9.5A6 6 0 0 1 6.5 2.5 6 6 0 1 0 13.5 9.5z"/></svg>
      </button>
      <button id="publish">发布</button>
    </header>
    <main id="workspace">
      <section id="left">
        <div id="frontmatter">
          <input id="f-title" type="text" placeholder="标题" autocomplete="off" />
          <input id="f-summary" type="text" placeholder="心情" autocomplete="off" />
          <input id="f-date" type="date" title="日期" />
          <input id="f-tags" type="text" placeholder="标签，逗号分隔" autocomplete="off" />
          <button id="cover-btn" type="button" title="封面（点击上传 / 管理）">
            <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><circle cx="5.5" cy="6.5" r="1.3"/><path d="M2.5 12l3.5-3.5 2.5 2.5 3-3 2 2"/></svg>
          </button>
          <input id="f-cover" type="file" accept="image/*" hidden />
        </div>
        <div id="editor"></div>
        <div id="gallery" hidden>
          <div id="gallery-items"></div>
        </div>
        <div id="drop-hint">松手插入图片</div>
        <div id="toolbar">
          <button data-module="photos" title="插入图片网格">
            <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="1.5" width="5.2" height="5.2" rx="1"/><rect x="9.3" y="1.5" width="5.2" height="5.2" rx="1"/><rect x="1.5" y="9.3" width="5.2" height="5.2" rx="1"/><rect x="9.3" y="9.3" width="5.2" height="5.2" rx="1"/></svg>
          </button>
          <button data-module="bigimage" title="插入单张大图">
            <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><circle cx="5.5" cy="6.5" r="1.3"/><path d="M2.5 12l3.5-3.5 2.5 2.5 3-3 2 2"/></svg>
          </button>
          <button data-module="quote" title="插入引用块">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 3.5c-1.2 1-1.8 2.3-1.8 4v5h4.5v-5H3.4c0-1.2.5-2.2 1.5-3zM10.3 3.5c-1.2 1-1.8 2.3-1.8 4v5H13v-5h-2.3c0-1.2.5-2.2 1.5-3z"/></svg>
          </button>
          <button data-module="reading" title="插入清单">
            <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="2.8" cy="4" r="1.1"/><circle cx="2.8" cy="8" r="1.1"/><circle cx="2.8" cy="12" r="1.1"/><path d="M6 4h8.5M6 8h8.5M6 12h8.5"/></svg>
          </button>
          <button id="gallery-toggle" type="button" title="图片面板：预览文章文件夹内的图片，点击插入">
            <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="3.5" y="3.5" width="11" height="9" rx="1.5"/><path d="M1.5 5v6.5A1.5 1.5 0 0 0 3 13h9.5"/><circle cx="6.8" cy="6.8" r="1.1"/><path d="M4.5 11l2.6-2.6 1.9 1.9 2.2-2.2 1.8 1.8"/></svg>
          </button>
          <span id="word-count"></span>
          <button id="focus-toggle" type="button" title="收起预览，专注写作">
            <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><path d="M10 2.5v11"/></svg>
          </button>
        </div>
        <div id="empty-state" hidden>
          <div class="empty-card">
            <p>还没有文章</p>
            <button id="empty-new" type="button" class="btn-primary">新建第一篇文章</button>
          </div>
        </div>
      </section>
      <div id="splitter" title="拖动调整分栏"></div>
      <section id="right">
        <iframe id="preview" title="预览"></iframe>
        <div id="preview-placeholder" hidden>
          <p>预览不可用</p>
          <p class="hint">hugo server 未运行或尚未就绪，恢复后会自动重连。</p>
        </div>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
